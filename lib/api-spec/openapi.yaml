openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification for Precious Metals Recovery Calculator
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: metals
    description: Precious metal price operations
  - name: materials
    description: Electronic materials and their metal content
  - name: chemicals
    description: Chemical processes for metal extraction
  - name: calculator
    description: Metal recovery calculation operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /metals/prices:
    get:
      operationId: getMetalPrices
      tags: [metals]
      summary: Get current precious metal prices in PLN
      description: Returns current Au, Ag, Pt, Pd prices from external API with 1hr cache
      responses:
        "200":
          description: Current metal prices
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetalPrices"

  /metals/prices/history:
    get:
      operationId: getMetalPricesHistory
      tags: [metals]
      summary: Get historical metal prices in PLN
      description: Returns daily historical Au, Ag, Pt, Pd prices for the requested range
      parameters:
        - name: range
          in: query
          required: false
          schema:
            type: string
            enum: [7d, 30d, 90d, 365d]
            default: 30d
      responses:
        "200":
          description: Historical metal prices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MetalHistoryPoint"

  /materials/electronics:
    get:
      operationId: getElectronicMaterials
      tags: [materials]
      summary: Get list of electronic component types with precious metal content
      description: Returns a comprehensive list of electronic types with min/max metal content per kg or unit
      responses:
        "200":
          description: List of electronic materials
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ElectronicMaterial"

  /chemicals/processes:
    get:
      operationId: getChemicalProcesses
      tags: [chemicals]
      summary: Get all wet chemistry extraction processes
      description: Returns all known wet chemistry processes with parameters, reagents, and expected yields
      responses:
        "200":
          description: List of chemical processes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChemicalProcess"

  /calculator/estimate:
    post:
      operationId: calculateRecovery
      tags: [calculator]
      summary: Calculate precious metal recovery estimate
      description: Given input batch, chemical process, and parameters, estimate recovered metals, costs, and profitability
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalculationRequest"
      responses:
        "200":
          description: Calculation result with profitability analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalculationResult"

  /calculator/purchase-price:
    post:
      operationId: calculatePurchasePrice
      tags: [calculator]
      summary: Calculate maximum purchase price for electronic scrap
      description: Given a material, process, and target profit margin, calculates the maximum price to pay per kg of input material
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurchasePriceRequest"
      responses:
        "200":
          description: Purchase price calculation result with per-kg breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchasePriceResult"

  /calculator/compare:
    post:
      operationId: compareProcesses
      tags: [calculator]
      summary: Compare all chemical processes for a given batch
      description: Runs the recovery estimate for all available processes using default parameters and returns a ranked summary table
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompareRequest"
      responses:
        "200":
          description: List of process comparison results sorted by net profit descending
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProcessCompareResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    MetalHistoryPoint:
      type: object
      properties:
        date:
          type: string
          format: date
          description: Date in YYYY-MM-DD format
        Au:
          type: number
          description: Gold price in PLN per gram
        Ag:
          type: number
          description: Silver price in PLN per gram
        Pt:
          type: number
          description: Platinum price in PLN per gram
        Pd:
          type: number
          description: Palladium price in PLN per gram
      required: [date, Au, Ag, Pt, Pd]

    MetalPrices:
      type: object
      properties:
        Au:
          type: number
          description: Gold price in PLN per gram
        Ag:
          type: number
          description: Silver price in PLN per gram
        Pt:
          type: number
          description: Platinum price in PLN per gram
        Pd:
          type: number
          description: Palladium price in PLN per gram
        updatedAt:
          type: string
          format: date-time
        source:
          type: string
          description: Data source name
      required:
        - Au
        - Ag
        - Pt
        - Pd
        - updatedAt
        - source

    MetalContent:
      type: object
      description: Metal content in grams per kg of material
      properties:
        Au:
          type: object
          properties:
            min:
              type: number
            max:
              type: number
            typical:
              type: number
          required: [min, max, typical]
        Ag:
          type: object
          properties:
            min:
              type: number
            max:
              type: number
            typical:
              type: number
          required: [min, max, typical]
        Pt:
          type: object
          properties:
            min:
              type: number
            max:
              type: number
            typical:
              type: number
          required: [min, max, typical]
        Pd:
          type: object
          properties:
            min:
              type: number
            max:
              type: number
            typical:
              type: number
          required: [min, max, typical]
      required: [Au, Ag, Pt, Pd]

    CleanedMultiplier:
      type: object
      description: Per-metal multipliers applied to metal content when material is cleaned (plastic/housing removed)
      properties:
        Au:
          type: number
        Ag:
          type: number
        Pt:
          type: number
        Pd:
          type: number
      required: [Au, Ag, Pt, Pd]

    ElectronicMaterial:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
          description: Polish name of the component type
        nameEn:
          type: string
          description: English name
        category:
          type: string
          enum: [plyty_glowne, pcb, procesor, pamiec, karta, dysk, urzadzenie, zasilacz, ic, zlacza, kondensator, inne]
        unit:
          type: string
          enum: [kg, piece]
          description: Default unit for this material (kg or piece). Users may override per batch row.
        weightPerPiece:
          type: number
          description: Estimated weight of one piece in kg. Required when unit=piece; optional but helpful for kg-unit materials to enable piece counting.
        metalContentPerKg:
          $ref: "#/components/schemas/MetalContent"
        notes:
          type: string
        requiresCleaning:
          type: boolean
          description: True if this material can be cleaned (plastic/housing removed) to increase effective metal content per kg
        cleanedMultiplier:
          $ref: "#/components/schemas/CleanedMultiplier"
      required: [id, name, nameEn, category, unit, metalContentPerKg]

    Reagent:
      type: object
      properties:
        name:
          type: string
        formula:
          type: string
        concentration:
          type: number
          description: Concentration in percent
        amountPerKg:
          type: number
          description: Amount in liters per kg of input material
        pricePerLiter:
          type: number
          description: Price in PLN per liter
      required: [name, formula, concentration, amountPerKg, pricePerLiter]

    ChemicalProcess:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
          description: Polish name of the process
        nameEn:
          type: string
        description:
          type: string
        targetMetals:
          type: array
          items:
            type: string
            enum: [Au, Ag, Pt, Pd]
        reagents:
          type: array
          items:
            $ref: "#/components/schemas/Reagent"
        temperatureMin:
          type: number
          description: Minimum process temperature in Celsius
        temperatureMax:
          type: number
          description: Maximum process temperature in Celsius
        temperatureOptimal:
          type: number
          description: Optimal process temperature in Celsius
        timePerKgMin:
          type: number
          description: Minimum processing time in hours per kg
        timePerKgMax:
          type: number
          description: Maximum processing time in hours per kg
        yieldPercent:
          type: object
          description: Expected yield percentage per metal
          properties:
            Au:
              type: number
            Ag:
              type: number
            Pt:
              type: number
            Pd:
              type: number
          required: [Au, Ag, Pt, Pd]
        electricityKwhPerKg:
          type: number
          description: Electricity consumption in kWh per kg (for electrolysis)
        safetyNotes:
          type: string
        steps:
          type: array
          items:
            type: string
      required:
        - id
        - name
        - nameEn
        - description
        - targetMetals
        - reagents
        - temperatureMin
        - temperatureMax
        - temperatureOptimal
        - timePerKgMin
        - timePerKgMax
        - yieldPercent
        - electricityKwhPerKg
        - safetyNotes
        - steps

    BatchItem:
      type: object
      properties:
        materialId:
          type: string
        quantity:
          type: number
          description: Amount in kg or pieces (depending on unit)
        isCleaned:
          type: boolean
          description: If true and the material has requiresCleaning=true, metal content is multiplied by cleanedMultiplier before calculation
      required: [materialId, quantity]

    CalculationRequest:
      type: object
      properties:
        batch:
          type: array
          items:
            $ref: "#/components/schemas/BatchItem"
          minItems: 1
        processId:
          type: string
        acidConcentrationOverride:
          type: number
          description: Optional acid concentration override in percent
        temperatureOverride:
          type: number
          description: Optional temperature override in Celsius
        electricityPricePerKwh:
          type: number
          description: Electricity price in PLN per kWh (default 0.80)
        reagentPriceOverrides:
          type: object
          description: Optional map of reagent name to custom price in PLN per liter
          additionalProperties:
            type: number
      required: [batch, processId]

    RecoveredMetal:
      type: object
      properties:
        metal:
          type: string
          enum: [Au, Ag, Pt, Pd]
        massGrams:
          type: number
          description: Estimated recovered mass in grams
        pricePerGram:
          type: number
          description: Current price in PLN per gram
        totalValuePln:
          type: number
          description: Total value in PLN
        yieldPercent:
          type: number
          description: Applied yield percentage
      required: [metal, massGrams, pricePerGram, totalValuePln, yieldPercent]

    ChemistryCost:
      type: object
      properties:
        reagentName:
          type: string
        amountLiters:
          type: number
        pricePerLiter:
          type: number
        totalCostPln:
          type: number
      required: [reagentName, amountLiters, pricePerLiter, totalCostPln]

    CalculationResult:
      type: object
      properties:
        totalInputMassKg:
          type: number
        processId:
          type: string
        processName:
          type: string
        estimatedTimeHours:
          type: number
        recoveredMetals:
          type: array
          items:
            $ref: "#/components/schemas/RecoveredMetal"
        chemistryCosts:
          type: array
          items:
            $ref: "#/components/schemas/ChemistryCost"
        electricityCostPln:
          type: number
        totalChemistryCostPln:
          type: number
        totalRevenuePln:
          type: number
        totalCostPln:
          type: number
        netProfitPln:
          type: number
        profitabilityRating:
          type: string
          enum: [very_profitable, profitable, marginal, not_profitable]
        profitabilityNote:
          type: string
          description: Polish language explanation
        metalPricesSnapshot:
          $ref: "#/components/schemas/MetalPrices"
      required:
        - totalInputMassKg
        - processId
        - processName
        - estimatedTimeHours
        - recoveredMetals
        - chemistryCosts
        - electricityCostPln
        - totalChemistryCostPln
        - totalRevenuePln
        - totalCostPln
        - netProfitPln
        - profitabilityRating
        - profitabilityNote
        - metalPricesSnapshot

    CompareRequest:
      type: object
      properties:
        batch:
          type: array
          items:
            $ref: "#/components/schemas/BatchItem"
          minItems: 1
        electricityPricePerKwh:
          type: number
          description: Electricity price in PLN per kWh (default 0.80)
      required: [batch]

    PurchasePriceRequest:
      type: object
      properties:
        materialId:
          type: string
          description: ID of the electronic material
        processId:
          type: string
          description: ID of the chemical process
        targetMarginPercent:
          type: number
          description: Target profit margin percentage (0–90)
        electricityPricePerKwh:
          type: number
          description: Electricity price in PLN per kWh (default 0.80)
        isCleaned:
          type: boolean
          description: If true and the material has requiresCleaning=true, metal content is multiplied by cleanedMultiplier before calculation
      required: [materialId, processId, targetMarginPercent]

    PurchasePriceResult:
      type: object
      properties:
        materialId:
          type: string
        materialName:
          type: string
        processId:
          type: string
        processName:
          type: string
        targetMarginPercent:
          type: number
        maxPurchasePricePerKgPln:
          type: number
          description: Maximum purchase price per kg of input material in PLN
        revenuePerKgPln:
          type: number
          description: Expected revenue per kg of input material in PLN
        processCostPerKgPln:
          type: number
          description: Total process cost per kg (chemistry + electricity) in PLN
        chemistryCostPerKgPln:
          type: number
          description: Chemistry reagents cost per kg in PLN
        electricityCostPerKgPln:
          type: number
          description: Electricity cost per kg in PLN
        grossProfitPerKgPln:
          type: number
          description: Gross profit per kg (revenue - process cost) before margin in PLN
        isBreakEven:
          type: boolean
          description: True when targetMarginPercent is 0 (break-even mode)
        isProfitable:
          type: boolean
          description: True when gross profit per kg is positive
      required:
        - materialId
        - materialName
        - processId
        - processName
        - targetMarginPercent
        - maxPurchasePricePerKgPln
        - revenuePerKgPln
        - processCostPerKgPln
        - chemistryCostPerKgPln
        - electricityCostPerKgPln
        - grossProfitPerKgPln
        - isBreakEven
        - isProfitable

    ProcessCompareResult:
      type: object
      properties:
        processId:
          type: string
        processName:
          type: string
        totalInputMassKg:
          type: number
        netProfitPln:
          type: number
        totalRevenuePln:
          type: number
        totalCostPln:
          type: number
        estimatedTimeHours:
          type: number
        profitabilityRating:
          type: string
          enum: [very_profitable, profitable, marginal, not_profitable]
        auMassGrams:
          type: number
          description: Recovered gold mass in grams
        agMassGrams:
          type: number
          description: Recovered silver mass in grams
      required:
        - processId
        - processName
        - totalInputMassKg
        - netProfitPln
        - totalRevenuePln
        - totalCostPln
        - estimatedTimeHours
        - profitabilityRating
        - auMassGrams
        - agMassGrams
